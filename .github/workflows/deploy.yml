name: Deploy TeamHub to server

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: d16057.usc1.stableserver.net
          username: kindredv
          port: 22
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            set -e

            cd /home/kindredv/teamhub

            git fetch origin main
            git checkout main
            git reset --hard origin/main

            cd client

            /home/kindredv/nodevenv/teamhub/admin/20/bin/npm install
            /home/kindredv/nodevenv/teamhub/admin/20/bin/node scripts/bump-build-version.js || true

            mkdir -p tmp
            touch tmp/restart.txt