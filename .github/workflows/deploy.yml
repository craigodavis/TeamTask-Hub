name: Deploy TeamHub to server

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check secret presence
        env:
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
        run: |
          if [ -z "$DEPLOY_KEY" ]; then
            echo "DEPLOY_KEY is empty"
            exit 1
          fi

          echo "DEPLOY_KEY exists"
          echo "$DEPLOY_KEY" | head -n 1
