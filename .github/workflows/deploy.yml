name: Deploy TeamHub to server

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Write SSH key to file
        env:
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
        run: |
          mkdir -p /home/runner/.ssh
          printf "%s\n" "$DEPLOY_KEY" > /home/runner/.ssh/github_action_key
          chmod 600 /home/runner/.ssh/github_action_key

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: d16057.usc1.stableserver.net
          username: kindredv
          port: 22
          key_path: /home/runner/.ssh/github_action_key
          script: |
            set -e

            cd /home/kindredv/teamhub

            git fetch origin main
            git checkout main
            git reset --hard origin/main

            cd admin

            /home/kindredv/nodevenv/teamhub/admin/20/bin/npm install
            /home/kindredv/nodevenv/teamhub/admin/20/bin/node scripts/bump-build-version.js || true

            mkdir -p tmp
            touch tmp/restart.txt